name: Firmware-M2
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ax18_or_m2:
        description: 'ax18_or_m2? (ax18/m2)'
        required: true
        default: 'm2'
      only_config:
        description: "only_config?"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config-M2-org.cfg
  DIY_P1_SH: diy-part1-M2-ORG.sh
  DIY_P2_SH: diy-part2-M2-ORG.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Show system & Setup
      run: |
        echo -e "Total CPU cores\t: $(nproc)"
        cat /proc/cpuinfo
        cat /proc/meminfo
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: ax18_or_m2
      if: contains('ax18.AX18', github.event.inputs.ax18_or_m2)
      run: |
        sed -i "s/CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_m2=y/CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_cmiot_ax18=y/g" config-M2-org.cfg

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Initialization environment
      if: ${{ github.event.inputs.only_config != 'true' }}
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt -y update --allow-unauthenticated
        sudo -E apt -y full-upgrade
        sudo -E apt -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget ccache
        sudo apt-get autoremove -y --purge
        sudo apt-get clean

    - name: Cache (toolchain + ccache) - HiGarfield
      if: ${{ github.event.inputs.only_config != 'true' }}
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: 'M2'
        prefix: ${{ github.workspace }}/openwrt

    # 强制清理旧 toolchain（一次性使用，跑完后可注释或删除）
    - name: Clean toolchain cache (one-time only - force GCC 13.3)
      if: ${{ github.event.inputs.only_config != 'true' }}
      working-directory: /workdir
      run: |
        echo "=== Cleaning old toolchain cache to force GCC 13.3 ==="
        rm -rf openwrt/staging_dir/toolchain-aarch64*
        rm -rf openwrt/staging_dir/host*
        rm -rf openwrt/build_dir/toolchain*
        echo "Toolchain cache cleaned. Will rebuild with GCC 13.3."

    - name: Cache dl
      if: ${{ github.event.inputs.only_config != 'true' }}
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-dl-${{ hashFiles('feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-dl-

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig
        cp .config CONFIG_M2.txt

    - name: Cache build_dir
      if: ${{ github.event.inputs.only_config != 'true' }}
      uses: actions/cache@v4
      with:
        path: openwrt/build_dir
        key: ${{ runner.os }}-build-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Cache staging_dir
      if: ${{ github.event.inputs.only_config != 'true' }}
      uses: actions/cache@v4
      with:
        path: openwrt/staging_dir
        key: ${{ runner.os }}-staging-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-staging-

    - name: Cache ccache
      if: ${{ github.event.inputs.only_config != 'true' }}
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Enable ccache
      if: ${{ github.event.inputs.only_config != 'true' }}
      run: |
        echo "USE_CCACHE=1" >> $GITHUB_ENV
        echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
        echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
        ccache -M 10G
        ccache -z
        ccache -s

    - name: Download package
      if: ${{ github.event.inputs.only_config != 'true' }}
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: Compile the firmware
      if: ${{ github.event.inputs.only_config != 'true' }}
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) V=s || make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      run: df -hT

    - name: Upload CONFIG
      uses: actions/upload-artifact@v4
      with:
        name: CONFIG_M2
        path: openwrt/CONFIG_M2.txt

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin
      continue-on-error: true

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
      continue-on-error: true

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H.%M")_M2" >> $GITHUB_OUTPUT
        touch release.txt
        echo "M2 firmware" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
      continue-on-error: true
